<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Occoquan Park Explorer</title>

<link rel="stylesheet" href="web/styles.css" />
<script src="web/app.js"></script>
</head>
<body class="light">
  <div id="app">
    <header class="topbar">
      <div class="search-row">
        <input id="searchBox" type="text" placeholder="Search trails, bathrooms, shelters..." />
        <button id="searchBtn">Search</button>
      </div>
      <div class="action-row">
        <button id="nearMeBtn">Near Me</button>
        <button id="darkModeBtn">Dark Mode</button>
      </div>
    </header>

    <div id="map"></div>

    <section class="bottom-sheet">
      <div class="sheet-tabs">
        <button class="tab-btn active" data-tab="layersTab">Layers</button>
        <button class="tab-btn" data-tab="filtersTab">Filters</button>
        <button class="tab-btn" data-tab="reportTab">Report</button>
        <button class="tab-btn" data-tab="legendTab">Legend</button>
      </div>

      <div class="sheet-content">
        <div id="layersTab" class="tab-panel active">
          <label><input type="checkbox" id="toggleTrails" checked /> Trails</label>
          <label><input type="checkbox" id="toggleFacilities" checked /> Facilities</label>
          <label><input type="checkbox" id="toggleParking" checked /> Parking</label>
          <label><input type="checkbox" id="toggleSensitive" checked /> Sensitive Areas</label>
          <label><input type="checkbox" id="toggleReports" checked /> User Reports</label>
        </div>

        <div id="filtersTab" class="tab-panel">
          <label>Trail Difficulty</label>
          <div class="chip-row">
            <button class="chip active" data-difficulty="all">All</button>
            <button class="chip" data-difficulty="easy">Easy</button>
            <button class="chip" data-difficulty="moderate">Moderate</button>
            <button class="chip" data-difficulty="hard">Hard</button>
          </div>

          <label for="lengthFilter">Max Trail Length (miles)</label>
          <input id="lengthFilter" type="range" min="1" max="10" value="10" />
          <div id="lengthValue">Up to 10 miles</div>
        </div>

        <div id="reportTab" class="tab-panel">
          <label>Category
            <select id="category">
              <option value="downed_tree">Downed Tree</option>
              <option value="flooding">Flooding</option>
              <option value="trash">Trash</option>
              <option value="wildlife">Wildlife</option>
              <option value="safety">Safety</option>
              <option value="other">Other</option>
            </select>
          </label>

          <label>Description
            <textarea id="description" rows="3" placeholder="Describe the issue clearly (minimum 20 characters)"></textarea>
          </label>

          <label>Photo URL (optional)
            <input id="photoUrl" type="text" placeholder="https://example.com/photo.jpg" />
          </label>

          <div class="report-actions">
            <button id="useMapPointBtn">Drop Pin</button>
            <button id="submitBtn">Submit Report</button>
          </div>

          <div id="msg" class="msg"></div>
        </div>

        <div id="legendTab" class="tab-panel">
          <div class="legend-item"><span class="legend-line easy"></span> Easy Trail</div>
          <div class="legend-item"><span class="legend-line moderate"></span> Moderate Trail</div>
          <div class="legend-item"><span class="legend-line hard"></span> Hard Trail</div>
          <div class="legend-item"><span class="legend-dot facility"></span> Facility</div>
          <div class="legend-item"><span class="legend-dot parking"></span> Parking</div>
          <div class="legend-item"><span class="legend-dot report-pending"></span> Pending Report</div>
          <div class="legend-item"><span class="legend-dot report-verified"></span> Verified Report</div>
          <p class="trust-note">
            User-submitted reports are marked as pending until reviewed. Verified reports are more trustworthy.
          </p>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
